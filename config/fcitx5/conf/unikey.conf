# Telex: tones are s f r x j, letters are aa aw ee oo ow uw dd.
InputMethod=Telex
OutputCharset=Unicode

# Don't commit a word as Vietnamese unless it actually is one, and undo the
# transformation when it turns out not to be. This is what keeps typing English
# words with Telex letters in them (test, few, next) from being mangled.
SpellCheck=True
AutoNonVnRestore=True

# Tone mark may be typed anywhere in the word, not only right after the vowel.
FreeMarking=True

# Classic tone placement: hoà, thuý. Set True for the "modern" hoà -> hòa style.
ModernStyle=False

ProcessWAtBegin=True
DisplayUnderline=True

# Read the word already left of the cursor so editing mid-word keeps working.
SurroundingText=True
ModifySurroundingText=False

# Must stay True. This does NOT just control macro expansion (the macro table is
# empty anyway). In unikey-im.cpp the `!macro` branch enables an "auto commit"
# fast path that sends bare consonants (b c f g h j k l m n p q r s t v x z)
# straight to the application with no preedit, then retroactively backspaces them
# when the vowel arrives. Native widgets tolerate that; browser web-content fields
# do not, so tone marks silently fail to apply there. True keeps the whole word in
# preedit until it is finished, which works everywhere.
Macro=True
