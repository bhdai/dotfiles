# monitor =,highres,auto,1.0,vrr,1
# # monitor = HDMI-A-1,preferred,auto,1
# monitor = HDMI-A-1,1280x1024,auto,1

cursor {
    no_hardware_cursors = false  # don't show cursor on screenshot
    hide_on_key_press = true
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    # kb_options = caps:swapescape
    kb_rules =

    float_switch_override_focus = 0
    follow_mouse = 2
    repeat_rate = 25
    repeat_delay = 200
    sensitivity = 0.4 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
        drag_lock = false
        tap-and-drag = true
        clickfinger_behavior = true
    }
}

general {
    allow_tearing = true
    gaps_in = 3 #5
    gaps_out = 10 #12
    border_size = 2
    col.active_border = rgba(07b5efff)
    col.inactive_border = rgba(292e42ff)
    layout = scrolling

    snap {
        enabled = true
        window_gap = 10    # gap between snapped floating windows
        monitor_gap = 10   # gap from monitor edges
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    enable_swallow = false
    swallow_regex = ^(org\.wezfurlong\.wezterm)$
    vrr = 1
}

decoration {
    active_opacity = 1
    # dim_special = 0.3
    fullscreen_opacity = 1.0
    # inactive_opacity = 0.8
    rounding = 8
    blur {
        brightness = 2.0
        contrast = 1.8
        enabled = true
        ignore_opacity = false
        new_optimizations = true
        noise = 0
        passes = 3
        popups = true
        popups_ignorealpha = 0.5
        size = 10
        special = false
        vibrancy = 0.0
        vibrancy_darkness = 0
        xray = false
    }
    shadow {
        color = 0x66000000
        enabled = true
        ignore_window = true
        offset = 2 2
        range = 8
        render_power = 2
    }
}

animations {
    enabled = true
    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    # Configs
    # windows
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    # layers
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    # fade
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    # workspaces
    animation = workspaces, 1, 7, menu_decel, slide
    ## specialWorkspace
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    # zoom
    animation = zoomFactor, 1, 3, standardDecel
}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    new_status = "master"
}

gestures {
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
}

# Avoid blurry XWayland apps.
xwayland {
    force_zero_scaling = true
}


binds {
    allow_workspace_cycles = true
    movefocus_cycles_fullscreen = true
}
