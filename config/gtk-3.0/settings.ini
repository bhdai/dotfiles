[Settings]
gtk-theme-name=Arc-Dark
gtk-icon-theme-name=Papirus
gtk-cursor-theme-name=Adwaita
gtk-application-prefer-dark-theme=1
# fcitx5 for GTK apps under X11/XWayland. Set here rather than as GTK_IM_MODULE
# so Wayland-native GTK apps keep using the text-input protocol directly.
gtk-im-module=fcitx
